services:
  app1:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: app1
    depends_on:
      - db
    environment:
      - DATABASE_NAME=appdb
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - FLASK_HOST=0.0.0.0
      - PORT=5000

  app2:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: app2
    depends_on:
      - db
    environment:
      - DATABASE_NAME=appdb
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - FLASK_HOST=0.0.0.0
      - PORT=5000

  app3:
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: app3
    depends_on:
      - db
    environment:
      - DATABASE_NAME=appdb
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - FLASK_HOST=0.0.0.0
      - PORT=5000

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3

  db:
    image: postgres:13
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"